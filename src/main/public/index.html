<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitContributionTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-slide-up {
        animation: slideUp 0.5s ease-out forwards;
      }
      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body
    class="bg-[#0f172a] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#0f172a] to-black text-slate-200 min-h-screen font-sans antialiased selection:bg-blue-500/30"
  >
    <nav
      class="w-full border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50"
    >
      <div class="max-w-7xl mx-auto px-6 h-16 flex items-center">
        <div class="flex items-center gap-3">
          <i class="fab fa-github text-blue-500 text-2xl"></i>
          <span class="text-xl font-bold tracking-tight text-white"
            >GitContributionTracker</span
          >
        </div>
      </div>
    </nav>

    <main
      class="max-w-7xl mx-auto p-6 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8"
    >
      <div class="lg:col-span-8 space-y-8">
        <div
          id="welcome-state"
          class="glass-card rounded-2xl p-12 text-center border-dashed border-2 border-slate-700 mt-10"
        >
          <i class="fas fa-satellite-dish text-6xl text-slate-600 mb-6"></i>
          <h2 class="text-2xl font-semibold text-slate-300 mb-2">
            Awaiting Search Query
          </h2>
          <p class="text-slate-500 max-w-md mx-auto">
            Enter a GitHub username in the terminal to retrieve repository
            metrics and language analytics.
          </p>
        </div>

        <div id="dashboard-content" class="hidden space-y-8">
          <div
            class="glass-card rounded-3xl p-8 relative overflow-hidden animate-slide-up"
          >
            <div
              class="absolute -right-20 -top-20 w-64 h-64 bg-blue-600/20 rounded-full blur-3xl"
            ></div>
            <div
              class="flex flex-col sm:flex-row items-center sm:items-start gap-8 relative z-10"
            >
              <img
                id="avatar"
                src=""
                alt="Profile"
                class="w-32 h-32 rounded-2xl shadow-2xl ring-4 ring-slate-800 object-cover"
              />
              <div class="text-center sm:text-left pt-2 w-full">
                <h2
                  id="name"
                  class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 tracking-tight mb-2"
                ></h2>
                <p
                  id="bio"
                  class="text-slate-400 text-lg leading-relaxed max-w-xl"
                ></p>
                <div
                  class="mt-4 flex flex-col sm:flex-row gap-3 items-center sm:items-start"
                >
                  <span
                    class="px-3 py-1 rounded-lg bg-slate-800 text-xs font-semibold text-slate-300 border border-slate-700 h-fit mt-4"
                    ><i class="fas fa-check-circle text-blue-500 mr-1"></i>
                    Verified</span
                  >
                  <div
                    class="flex gap-6 mt-4 sm:ml-4 text-sm text-slate-400 border-t sm:border-t-0 sm:border-l border-slate-700/50 pt-4 sm:pt-0 sm:pl-4 w-full sm:w-auto justify-center sm:justify-start"
                  >
                    <div class="flex flex-col items-center sm:items-start">
                      <span id="repo-count" class="text-white font-bold text-lg"
                        >0</span
                      >
                      <span class="text-xs uppercase tracking-wider"
                        >Repos</span
                      >
                    </div>
                    <div class="flex flex-col items-center sm:items-start">
                      <span
                        id="follower-count"
                        class="text-white font-bold text-lg"
                        >0</span
                      >
                      <span class="text-xs uppercase tracking-wider"
                        >Followers</span
                      >
                    </div>
                    <div class="flex flex-col items-center sm:items-start">
                      <span
                        id="following-count"
                        class="text-white font-bold text-lg"
                        >0</span
                      >
                      <span class="text-xs uppercase tracking-wider"
                        >Following</span
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div
            class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-slide-up"
            style="animation-delay: 0.1s"
          >
            <div class="glass-card rounded-2xl p-6 border border-slate-700/50">
              <h3 class="text-lg font-bold text-white mb-4">
                <i class="fas fa-chart-pie text-blue-500 mr-2"></i> Language
                Distribution
              </h3>
              <div
                class="relative h-64 w-full flex items-center justify-center"
              >
                <canvas id="languageChart"></canvas>
              </div>
            </div>

            <div
              class="glass-card rounded-2xl p-6 border border-slate-700/50 flex flex-col h-full"
            >
              <h3 class="text-lg font-bold text-white mb-4">
                <i class="fas fa-layer-group text-blue-500 mr-2"></i> Repository
                Intelligence
              </h3>
              <div
                id="repo-list"
                class="flex flex-col gap-3 overflow-y-auto custom-scrollbar flex-grow"
                style="max-height: 250px"
              ></div>
            </div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-4 space-y-6">
        <div class="glass-card rounded-2xl p-6 relative overflow-hidden">
          <div
            class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 to-indigo-500"
          ></div>
          <h3
            class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4"
          >
            Search repo name
          </h3>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none"
            >
              <i
                class="fas fa-terminal text-slate-500 group-focus-within:text-blue-500 transition-colors"
              ></i>
            </div>
            <input
              type="text"
              id="username"
              placeholder="github_username..."
              class="w-full pl-11 pr-14 py-4 rounded-xl border border-slate-700 bg-slate-900/50 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all font-mono"
              onkeypress="if (event.key === 'Enter') fetchData();"
            />
            <button
              onclick="fetchData()"
              class="absolute inset-y-2 right-2 px-4 rounded-lg bg-blue-600 hover:bg-blue-500 text-white transition-all shadow-lg hover:shadow-blue-500/25 flex items-center justify-center"
            >
              <i class="fas fa-arrow-right"></i>
            </button>
          </div>
        </div>

        <div
          class="glass-card rounded-2xl p-6 h-[calc(100vh-24rem)] overflow-y-auto custom-scrollbar"
        >
          <div
            class="flex items-center justify-between mb-6 sticky top-0 bg-[#162032] -mx-6 -mt-6 p-6 border-b border-slate-700/50 z-10"
          >
            <h3
              class="text-sm font-bold text-slate-400 uppercase tracking-widest"
            >
              Audit Log
            </h3>
            <i
              class="fas fa-database text-slate-600"
              title="PostgreSQL Connected"
            ></i>
          </div>
          <div id="history-list" class="space-y-3">
            <div class="animate-pulse flex space-x-4">
              <div class="flex-1 space-y-4 py-1">
                <div class="h-2 bg-slate-700 rounded w-3/4"></div>
                <div class="h-2 bg-slate-700 rounded w-1/2"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      let chartInstance = null;
      window.onload = fetchHistory;

      async function fetchHistory() {
        try {
          const res = await fetch("http://localhost:8080/api/history");
          const history = await res.json();
          const list = document.getElementById("history-list");
          list.innerHTML = "";

          if (history.length === 0) {
            list.innerHTML = `
              <div class="flex flex-col items-center justify-center py-10 text-slate-500">
                <i class="fas fa-inbox text-3xl mb-3 opacity-50"></i>
                <span class="text-sm">No queries logged.</span>
              </div>`;
            return;
          }

          history.forEach((item) => {
            const date = new Date(item.searched_at).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            });
            list.innerHTML += `
              <div class="group flex items-center justify-between p-3 rounded-xl hover:bg-slate-800/50 border border-transparent hover:border-slate-700 transition-all cursor-default">
                <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 group-hover:border-blue-500/30 transition-colors">
                    <i class="fas fa-user-astronaut text-xs text-slate-400 group-hover:text-blue-400"></i>
                  </div>
                  <strong class="text-slate-200 font-medium">${item.username}</strong>
                </div>
                <span class="text-slate-500 text-xs font-mono bg-slate-900/80 px-2 py-1 rounded border border-slate-800">${date}</span>
              </div>`;
          });
        } catch (e) {
          document.getElementById("history-list").innerHTML =
            '<div class="text-red-400 bg-red-900/10 p-4 rounded-xl border border-red-900/30 text-sm flex items-center gap-2"><i class="fas fa-exclamation-triangle"></i> Database link severed.</div>';
        }
      }

      function renderChart(recentActivity) {
        const langCounts = {};
        recentActivity.forEach((repo) => {
          if (repo.language) {
            langCounts[repo.language] = (langCounts[repo.language] || 0) + 1;
          }
        });

        const labels = Object.keys(langCounts);
        const data = Object.values(langCounts);

        if (labels.length === 0) {
          labels.push("Unknown");
          data.push(1);
        }

        const ctx = document.getElementById("languageChart").getContext("2d");

        if (chartInstance) {
          chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: labels,
            datasets: [
              {
                data: data,
                backgroundColor: [
                  "#3b82f6",
                  "#10b981",
                  "#f59e0b",
                  "#ef4444",
                  "#8b5cf6",
                  "#64748b",
                  "#ec4899",
                ],
                borderWidth: 0,
                hoverOffset: 6,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: "75%",
            plugins: {
              legend: {
                position: "right",
                labels: {
                  color: "#94a3b8",
                  font: { family: "monospace", size: 11 },
                  usePointStyle: true,
                  padding: 15,
                },
              },
            },
          },
        });
      }

      async function fetchData() {
        const username = document.getElementById("username").value;
        if (!username) return;

        const btn = document.querySelector("button");
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
          const response = await fetch(
            `http://localhost:8080/api/github/${username}`,
          );
          const data = await response.json();

          if (data.error) throw new Error();

          // Reset the welcome state styling just in case it was previously an error
          document.querySelector("#welcome-state i").className =
            "fas fa-satellite-dish text-6xl text-slate-600 mb-6";
          document.querySelector("#welcome-state h2").innerText =
            "Awaiting Search Query";
          document.querySelector("#welcome-state p").innerText =
            "Enter a GitHub username in the terminal to retrieve repository metrics and language analytics.";

          document.getElementById("welcome-state").style.display = "none";

          document.getElementById("avatar").src = data.profile.avatar_url;
          document.getElementById("name").innerText =
            data.profile.name || data.profile.login;
          document.getElementById("bio").innerText =
            data.profile.bio ||
            "No biography data available in target's profile.";

          // Map the new counters from the GitHub API response
          document.getElementById("repo-count").innerText =
            data.profile.public_repos || 0;
          document.getElementById("follower-count").innerText =
            data.profile.followers || 0;
          document.getElementById("following-count").innerText =
            data.profile.following || 0;

          const repoList = document.getElementById("repo-list");
          repoList.innerHTML = "";

          data.recentActivity.forEach((repo) => {
            const langIcon = repo.language
              ? `<span class="text-[10px] text-slate-400 font-mono"><i class="fas fa-circle text-[8px] mr-1 text-emerald-400"></i>${repo.language}</span>`
              : "";
            repoList.innerHTML += `
              <a href="${repo.html_url}" target="_blank" class="block p-3 bg-slate-800/40 hover:bg-slate-700/60 border border-slate-700/50 hover:border-blue-500/50 rounded-xl transition-all duration-300 group">
                <div class="flex items-center justify-between mb-1">
                  <h4 class="text-blue-400 font-semibold group-hover:text-blue-300 truncate pr-2 text-sm">
                    ${repo.name}
                  </h4>
                  <i class="fas fa-external-link-alt text-[10px] text-slate-600 group-hover:text-blue-400 opacity-0 group-hover:opacity-100 transition-all"></i>
                </div>
                ${langIcon}
              </a>`;
          });

          renderChart(data.recentActivity);

          document
            .getElementById("dashboard-content")
            .classList.remove("hidden");

          fetchHistory();
        } catch (error) {
          // Smooth UI error state instead of the harsh alert() box
          document.getElementById("welcome-state").style.display = "block";
          document.getElementById("dashboard-content").classList.add("hidden");
          document.querySelector("#welcome-state h2").innerText =
            "User Not Found or Rate Limited";
          document.querySelector("#welcome-state p").innerText =
            "GitHub API rejected the request. Please check the spelling or try a different network.";
          document.querySelector("#welcome-state i").className =
            "fas fa-exclamation-triangle text-6xl text-red-500 mb-6";
        } finally {
          btn.innerHTML = '<i class="fas fa-arrow-right"></i>';
        }
      }
    </script>
  </body>
</html>
